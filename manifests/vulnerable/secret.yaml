# ⚠️  УЯЗВИМАЯ КОНФИГУРАЦИЯ — только для baseline демонстрации
# Секреты в репозитории в base64 — НЕ шифрование!
# base64 декодируется за секунду без ключа
#
# echo "YWRtaW4xMjM=" | base64 -d  => admin123
# echo "c3VwZXJzZWNyZXRrZXk=" | base64 -d  => supersecretkey

apiVersion: v1
kind: Secret
metadata:
  name: juiceshop-secret
  namespace: default
type: Opaque
data:
  admin-password: YWRtaW4xMjM=
  jwt-secret: c3VwZXJzZWNyZXRrZXk=
