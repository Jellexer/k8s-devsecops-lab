# ✅ NetworkPolicy — изоляция сетевого доступа к Juice Shop
#
# До: любой под в кластере мог обратиться к приложению напрямую
# После:
#   Ingress — только от Ingress Controller (namespace ingress-nginx)
#   Egress  — только DNS (UDP 53)

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: juiceshop-netpol
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: juiceshop
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - ports:
        - protocol: UDP
          port: 53
