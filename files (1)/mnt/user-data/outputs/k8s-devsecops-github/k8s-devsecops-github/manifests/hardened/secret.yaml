# ✅ HARDENED — секреты убраны из репозитория
#
# Значения не хранятся в git.
# Секрет создаётся напрямую в кластере:
#
#   kubectl create secret generic juiceshop-secret \
#     --from-literal=admin-password=YOUR_SECURE_PASSWORD \
#     --from-literal=jwt-secret=YOUR_SECURE_JWT_KEY
#
# Почему это безопасно:
#   — пароли существуют только внутри кластера (etcd)
#   — gitleaks не найдёт секреты при сканировании репо
#   — разные пароли для dev/prod без изменения кода

apiVersion: v1
kind: Secret
metadata:
  name: juiceshop-secret
  namespace: default
type: Opaque
# data секция намеренно отсутствует
