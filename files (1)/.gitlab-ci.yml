stages:
  - sast
  - secrets
  - scan-image
  - scan-manifests
  - deploy

variables:
  JUICE_SHOP_IMAGE: "bkimminich/juice-shop:v15.0.0"

# ── SAST: Semgrep ─────────────────────────────────────────────
semgrep:
  stage: sast
  image: python:3.11
  before_script:
    - pip install semgrep --quiet
  script:
    - echo "=== SAST: Semgrep ==="
    - semgrep scan --config=auto --error manifests/
  tags:
    - git-runner
  allow_failure: false  # 🔴 БЛОКИРУЕТ при критических находках

# ── Secrets: gitleaks ─────────────────────────────────────────
gitleaks:
  stage: secrets
  image: ubuntu:22.04
  before_script:
    - apt-get update -qq && apt-get install -y wget tar git -qq
    - wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz -O /tmp/gitleaks.tar.gz
    - tar -xzf /tmp/gitleaks.tar.gz -C /tmp && mv /tmp/gitleaks /usr/local/bin/
  script:
    - echo "=== Secrets scan: gitleaks ==="
    - gitleaks detect --source=./manifests --no-git --verbose
  tags:
    - git-runner
  allow_failure: false  # 🔴 БЛОКИРУЕТ при наличии секретов

# ── Trivy: сканирование образа ────────────────────────────────
trivy:
  stage: scan-image
  image: ubuntu:22.04
  when: manual
  variables:
    TRIVY_NO_PROGRESS: "true"
  before_script:
    - apt-get update -qq && apt-get install -y wget -qq
    - wget -q https://github.com/aquasecurity/trivy/releases/download/v0.50.1/trivy_0.50.1_Linux-64bit.tar.gz -O /tmp/trivy.tar.gz
    - tar -xzf /tmp/trivy.tar.gz -C /tmp && mv /tmp/trivy /usr/local/bin/
  script:
    - echo "=== Trivy: сканирование образа ==="
    - trivy image --severity HIGH,CRITICAL --format table $JUICE_SHOP_IMAGE
  tags:
    - git-runner
  allow_failure: true  # информационно

# ── Kubesec: анализ манифестов ────────────────────────────────
kubesec:
  stage: scan-manifests
  image: python:3.11
  before_script:
    - apt-get update -qq && apt-get install -y wget tar -qq
    - wget -q https://github.com/controlplaneio/kubesec/releases/download/v2.13.0/kubesec_linux_amd64.tar.gz -O /tmp/kubesec.tar.gz
    - tar -xzf /tmp/kubesec.tar.gz -C /tmp && mv /tmp/kubesec /usr/local/bin/
  script:
    - echo "=== Kubesec: анализ deployment.yaml ==="
    - kubesec scan manifests/hardened/deployment.yaml
    - |
      SCORE=$(kubesec scan manifests/hardened/deployment.yaml | python3 -c "import json,sys; print(json.load(sys.stdin)[0]['score'])")
      echo "Kubesec score: $SCORE"
      if [ "$SCORE" -lt "0" ]; then
        echo "🔴 Score отрицательный — небезопасная конфигурация!"
        exit 1
      fi
      echo "✅ Score: $SCORE — конфигурация приемлема"
  tags:
    - git-runner
  allow_failure: false  # 🔴 БЛОКИРУЕТ если score < 0

# ── Checkov: IaC scanning ─────────────────────────────────────
checkov:
  stage: scan-manifests
  image: python:3.11
  when: manual
  before_script:
    - pip install checkov --quiet
  script:
    - echo "=== Checkov: сканирование манифестов ==="
    - checkov -d manifests/hardened/ --framework kubernetes --quiet 2>/dev/null
  tags:
    - git-runner
  allow_failure: true  # информационно

# ── Deploy ────────────────────────────────────────────────────
deploy:
  stage: deploy
  image: ubuntu:22.04
  before_script:
    - apt-get update -qq && apt-get install -y curl -qq
    - curl -LO "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
    - chmod +x kubectl && mv kubectl /usr/local/bin/
    - mkdir -p ~/.kube
    - echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
  script:
    - echo "=== Deploy ==="
    - kubectl apply -f manifests/hardened/
    - kubectl get pods
  tags:
    - git-runner
  only:
    - main
